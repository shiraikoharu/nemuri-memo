<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4efe6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ねむりメモ" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.json" />
    <title>ねむりメモ</title>
    <style>
      :root {
        --bg: #fff7f8;
        --surface: #fffefd;
        --surface-soft: #fffafc;
        --ink: #3a3130;
        --muted: #82716f;
        --line: #f0dde2;
        --primary: #c69aa2;
        --primary-dark: #9f747d;
        --primary-ink: #ffffff;
        --accent: #f7dfe5;
        --accent-soft: #f8e7ea;
        --warm: #f8e0e6;
        --sleepless: #fff1f3;
        --shadow: 0 12px 30px rgba(137, 97, 106, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        max-width: 100%;
        font: inherit;
      }

      button {
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      input[type="date"],
      input[type="time"],
      select {
        min-height: 54px;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 8px;
        line-height: normal;
      }

      textarea {
        resize: vertical;
      }

      .app-shell {
        width: 100%;
        max-width: 520px;
        min-height: 100dvh;
        margin: 0 auto;
        padding: calc(16px + env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 18% 0%, rgba(248, 224, 230, 0.78), transparent 34%),
          linear-gradient(180deg, #fff7f8 0%, #fbf3f1 52%, #fffaf6 100%);
      }

      .header {
        padding: 10px 2px 18px;
        text-align: center;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1.2;
      }

      h2 {
        font-size: 20px;
        text-align: center;
      }

      .panel,
      .field,
      .record-card {
        border: 1px solid rgba(159, 116, 125, 0.13);
        border-radius: 8px;
        background: rgba(255, 253, 249, 0.92);
        box-shadow: var(--shadow);
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        margin-bottom: 16px;
      }

      .field {
        display: grid;
        gap: 10px;
        padding: 14px;
        box-shadow: none;
      }

      .field h3 {
        color: var(--muted);
        font-size: 15px;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-size: 19px;
        padding: 10px 12px;
      }

      select {
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 20px) 50%,
          calc(100% - 14px) 50%;
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        padding-right: 36px;
      }

      .choices,
      .filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .filter-panel {
        position: relative;
        display: grid;
        gap: 8px;
      }

      .filter-toggle {
        width: 100%;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 254, 253, 0.86);
        color: var(--primary-dark);
        font-weight: 800;
      }

      .filter-menu {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(198, 154, 162, 0.2);
        border-radius: 8px;
        background: rgba(255, 254, 253, 0.96);
        padding: 8px;
      }

      .choice,
      .primary,
      .secondary,
      .filter,
      .file-button,
      .today-button,
      .card-action {
        min-height: 52px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 800;
      }

      .choice.active,
      .filter.active {
        border-color: transparent;
        background: var(--primary);
        color: var(--primary-ink);
      }

      .primary {
        min-height: 64px;
        border: 0;
        background: var(--primary);
        color: var(--primary-ink);
        font-size: 20px;
      }

      .secondary,
      .file-button,
      .today-button,
      .card-action {
        display: grid;
        place-items: center;
        padding: 0 12px;
        text-align: center;
      }

      .today-button {
        min-height: 60px;
        background: var(--accent-soft);
        font-size: 18px;
      }

      .danger {
        color: #8a5a58;
      }

      .file-button input {
        display: none;
      }

      .success,
      .sleep-result {
        border-radius: 8px;
        background: var(--accent);
        padding: 12px;
        font-size: 17px;
        font-weight: 800;
      }

      .month-head {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 8px;
      }

      .summary {
        display: grid;
        gap: 8px;
        border-radius: 8px;
        background: rgba(248, 231, 234, 0.86);
        padding: 12px;
        font-weight: 700;
      }

      .cards {
        display: grid;
        gap: 12px;
      }

      .record-card {
        scroll-margin-top: 14px;
        display: grid;
        gap: 14px;
        padding: 14px;
        background: rgba(255, 253, 249, 0.94);
      }

      .record-card.today {
        outline: 3px solid rgba(198, 154, 162, 0.28);
      }

      .record-card.sleepless {
        background: var(--sleepless);
      }

      .record-card.empty {
        background: rgba(255, 250, 252, 0.72);
        color: var(--muted);
      }

      .record-head {
        display: grid;
        gap: 4px;
      }

      .record-head h3 {
        font-size: 22px;
      }

      .card-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .card-action {
        width: auto;
        min-height: 36px;
        padding: 0 14px;
        border-color: rgba(198, 154, 162, 0.24);
        background: rgba(255, 250, 252, 0.82);
        color: var(--primary-dark);
        font-size: 14px;
      }

      dl {
        display: grid;
        gap: 9px;
        margin: 0;
      }

      dl div {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 8px;
        align-items: baseline;
      }

      dt {
        color: var(--muted);
        font-weight: 800;
      }

      dd {
        min-width: 0;
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .card-groups {
        display: grid;
        gap: 16px;
      }

      .card-group {
        display: grid;
        gap: 9px;
      }

      @media (max-width: 380px) {
        .app-shell {
          padding-inline: 10px;
        }

        .choices,
        .filters,
        .month-head {
          grid-template-columns: 1fr;
        }

        dl div {
          grid-template-columns: 88px minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const STORAGE_KEYS = ["nemuriMemoRecords", "nemuri-memo-records", "sleepRecords", "records"];
      const STORAGE_KEY = STORAGE_KEYS.find((key) => localStorage.getItem(key) !== null) || "nemuriMemoRecords";
      const MEDICINE_OPTIONS = ["", "0", "0.5", "1", "1.5", "2", "2.5", "3", "3.5", "4", "4.5", "5", "5以上"];
      const app = document.querySelector("#app");
      const openedDate = today();

      let records = loadRecords();
      let selectedDate = openedDate;
      let monthCursor = new Date();
      let filterMode = "all";
      let filterOpen = false;
      let message = "";

      if ("serviceWorker" in navigator) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js?v=3").then((registration) => {
            registration.update();
            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }
            registration.addEventListener("updatefound", () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", () => {
                if (worker.state === "installed" && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
          }).catch(() => {});
        });
      }

      function today() {
        const date = new Date();
        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
        return date.toISOString().slice(0, 10);
      }

      function uid() {
        return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
      }

      function emptyRecord(date = today()) {
        return {
          id: uid(),
          date,
          bedTime: "",
          sleepStatus: "",
          fellAsleepTime: "",
          wakeTime: "",
          nightWaking: "",
          wakeCount: "",
          returnSleep: "",
          nightmare: "",
          riseStatus: "",
          riseTime: "",
          medicine: "",
          memo: "",
          updatedAt: new Date().toISOString()
        };
      }

      function text(value) {
        return typeof value === "string" ? value : "";
      }

      function oneOf(value, choices) {
        return choices.includes(value) ? value : "";
      }

      function normalizeMedicine(value) {
        const raw = text(value).trim();
        if (!raw) return "";
        if (raw === "5以上") return raw;
        const match = raw.match(/[0-9]+(?:\.[0-9]+)?/);
        if (!match) return raw;
        const number = Number(match[0]);
        if (!Number.isFinite(number)) return raw;
        if (number >= 5) return raw.includes("以上") ? "5以上" : "5";
        const rounded = Math.round(number * 2) / 2;
        return String(rounded).replace(/\.0$/, "");
      }

      function medicineNumber(value) {
        const normalized = normalizeMedicine(value);
        if (normalized === "") return null;
        if (normalized === "5以上") return 5;
        const number = Number(normalized);
        return Number.isFinite(number) ? number : null;
      }

      function normalizeRecord(raw) {
        const fellAsleepTime = text(raw.fellAsleepTime || raw.fellAsleepAt || raw.sleepTime);
        const wakeTime = text(raw.wakeTime || raw.wokeUpAt);
        const inferredStatus = fellAsleepTime || wakeTime ? "眠れた" : "";
        const sleepStatus = oneOf(raw.sleepStatus, ["眠れた", "眠れない"]) || inferredStatus;

        const record = {
          ...emptyRecord(text(raw.date || raw.record_date) || today()),
          id: text(raw.id) || uid(),
          bedTime: text(raw.bedTime || raw.wentToBedAt || raw.went_to_bed_at),
          sleepStatus,
          fellAsleepTime,
          wakeTime,
          nightWaking: raw.nightWaking === true ? "あり" : raw.nightWaking === false ? "なし" : oneOf(raw.nightWaking, ["なし", "あり"]),
          wakeCount: oneOf(raw.wakeCount, ["1回", "複数回"]),
          returnSleep: oneOf(raw.returnSleep, ["できた", "できない", "両方"]),
          nightmare: raw.nightmare === true ? "あり" : raw.nightmare === false ? "なし" : oneOf(raw.nightmare, ["なし", "あり"]),
          riseStatus: oneOf(raw.riseStatus, ["すぐ起きられた", "起きられない"]),
          riseTime: text(raw.riseTime),
          medicine: normalizeMedicine(raw.medicine),
          memo: text(raw.memo),
          updatedAt: text(raw.updatedAt) || new Date().toISOString()
        };

        return record.sleepStatus === "眠れない" ? clearSleepDetails(record) : record;
      }

      function clearSleepDetails(record) {
        return {
          ...record,
          fellAsleepTime: "",
          wakeTime: "",
          nightWaking: "",
          wakeCount: "",
          returnSleep: "",
          nightmare: "",
          riseStatus: "",
          riseTime: ""
        };
      }

      function loadRecords() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return [];
          const parsed = JSON.parse(saved);
          const source = Array.isArray(parsed) ? parsed : Array.isArray(parsed.records) ? parsed.records : [];
          return source.map(normalizeRecord);
        } catch {
          return [];
        }
      }

      function saveRecords() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function currentRecord() {
        return records.find((record) => record.date === selectedDate) || emptyRecord(selectedDate);
      }

      function upsertRecord(nextRecord) {
        const normalized = normalizeRecord({ ...nextRecord, updatedAt: new Date().toISOString() });
        const index = records.findIndex((record) => record.date === normalized.date);
        records = index >= 0
          ? records.map((record, currentIndex) => currentIndex === index ? normalized : record)
          : [...records, normalized];
        records.sort((a, b) => a.date.localeCompare(b.date));
        saveRecords();
      }

      function deleteRecord(date) {
        records = records.filter((record) => record.date !== date);
        saveRecords();
      }

      function monthDates(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const count = new Date(year, month + 1, 0).getDate();
        return Array.from({ length: count }, (_, index) => {
          const day = index + 1;
          return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        });
      }

      function formatDate(value) {
        const date = new Date(`${value}T00:00:00`);
        const weekday = ["日", "月", "火", "水", "木", "金", "土"][date.getDay()];
        return `${date.getMonth() + 1}/${date.getDate()}（${weekday}）`;
      }

      function minutesFromTime(value) {
        if (!/^\d{2}:\d{2}$/.test(value)) return null;
        const [hours, minutes] = value.split(":").map(Number);
        if (!Number.isFinite(hours) || !Number.isFinite(minutes)) return null;
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
        return hours * 60 + minutes;
      }

      function sleepMinutes(record) {
        if (!record || record.sleepStatus !== "眠れた") return null;
        const start = minutesFromTime(record.fellAsleepTime);
        const end = minutesFromTime(record.wakeTime);
        if (start === null || end === null) return null;
        return end >= start ? end - start : end + 24 * 60 - start;
      }

      function averageSleepMinutes(record) {
        if (!record) return null;
        if (record.sleepStatus === "眠れない") return 0;
        if (record.sleepStatus === "眠れた") return sleepMinutes(record);
        return null;
      }

      function sleepLabel(record) {
        if (!record || !record.sleepStatus) return "未記録";
        if (record.sleepStatus === "眠れない") return "眠れない";
        const minutes = sleepMinutes(record);
        if (minutes === null || !Number.isFinite(minutes)) return "未記録";
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return `${hours}時間${rest ? `${rest}分` : ""}`;
      }

      function minutesLabel(minutes) {
        if (minutes === null || !Number.isFinite(minutes)) return "未記録";
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return `${hours}時間${rest ? `${rest}分` : ""}`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function field(label, body) {
        return `<section class="field"><h3>${label}</h3>${body}</section>`;
      }

      function row(label, value) {
        if (value === undefined || value === null || value === "") return "";
        return `<div><dt>${label}</dt><dd>${escapeHtml(value)}</dd></div>`;
      }

      function groupRows(rows) {
        const html = rows.filter(Boolean).join("");
        return html ? `<dl class="card-group">${html}</dl>` : "";
      }

      function choices(fieldName, values, selected) {
        return `
          <div class="choices">
            ${values.map((value) => `
              <button class="choice ${selected === value ? "active" : ""}" data-field="${fieldName}" data-value="${value}">
                ${escapeHtml(value)}
              </button>
            `).join("")}
          </div>
        `;
      }

      function medicineSelect(value) {
        const normalized = normalizeMedicine(value);
        const options = MEDICINE_OPTIONS.includes(normalized) ? MEDICINE_OPTIONS : [...MEDICINE_OPTIONS, normalized];
        return `
          <select data-field="medicine">
            ${options.map((option) => `
              <option value="${escapeHtml(option)}" ${normalized === option ? "selected" : ""}>
                ${option === "" ? "未選択" : escapeHtml(option)}
              </option>
            `).join("")}
          </select>
        `;
      }

      function renderForm(record) {
        const showSleepDetails = record.sleepStatus !== "眠れない";
        const sleepFields = showSleepDetails ? `
          ${field("眠れた時刻（だいたいで大丈夫）", `<input type="time" data-field="fellAsleepTime" value="${record.fellAsleepTime}">`)}
          ${field("起床時刻", `<input type="time" data-field="wakeTime" value="${record.wakeTime}">`)}
          ${field("途中覚醒", choices("nightWaking", ["なし", "あり"], record.nightWaking))}
          ${field("悪夢", choices("nightmare", ["なし", "あり"], record.nightmare))}
          ${field("起き上がり", choices("riseStatus", ["すぐ起きられた", "起きられない"], record.riseStatus))}
          <div class="sleep-result">睡眠時間：${sleepLabel(record)}</div>
        ` : "";

        return `
          <section class="panel form-panel" id="form-panel">
            ${field("日付", `<input type="date" data-field="date" value="${record.date}">`)}
            ${field("ベッドに入った時刻", `<input type="time" data-field="bedTime" value="${record.bedTime}">`)}
            ${field("眠れた？", choices("sleepStatus", ["眠れた", "眠れない"], record.sleepStatus))}
            ${sleepFields}
            ${field("眠剤", medicineSelect(record.medicine))}
            ${field("メモ", `<textarea data-field="memo" rows="3">${escapeHtml(record.memo)}</textarea>`)}
            <button class="primary" data-action="finish">記録する</button>
            ${message ? `<p class="success">${message}</p>` : ""}
          </section>
        `;
      }

      function recordsInMonth() {
        const byDate = new Map(records.map((record) => [record.date, record]));
        return monthDates(monthCursor).map((date) => ({ date, record: byDate.get(date) }));
      }

      function filteredCards() {
        return recordsInMonth().filter(({ record }) => {
          if (filterMode === "all") return true;
          if (!record) return false;
          if (filterMode === "sleepless") return record.sleepStatus === "眠れない";
          if (filterMode === "nightmare") return record.nightmare === "あり";
          return record.nightWaking === "あり";
        });
      }

      function renderSummary() {
        const all = recordsInMonth().map((item) => item.record).filter(Boolean);
        const sleepDurations = all.map(averageSleepMinutes).filter((value) => value !== null && Number.isFinite(value));
        const averageSleep = sleepDurations.length
          ? minutesLabel(Math.round(sleepDurations.reduce((sum, value) => sum + value, 0) / sleepDurations.length))
          : "未記録";
        const medicineValues = all.map((record) => medicineNumber(record.medicine)).filter((value) => value !== null);
        const averageMedicine = medicineValues.length
          ? `${(medicineValues.reduce((sum, value) => sum + value, 0) / medicineValues.length).toFixed(1)}錠`
          : "未記録";

        return `
          <section class="summary">
            <p>記録日数：${all.length}日/${monthDates(monthCursor).length}日　合計${all.length}回</p>
            <p>平均睡眠時間：${averageSleep}</p>
            <p>眠れない日：${all.filter((record) => record.sleepStatus === "眠れない").length}件</p>
            <p>途中覚醒あり：${all.filter((record) => record.nightWaking === "あり").length}件</p>
            <p>悪夢あり：${all.filter((record) => record.nightmare === "あり").length}件</p>
            <p>平均眠剤錠数：${averageMedicine}</p>
          </section>
        `;
      }

      function renderCard(date, record) {
        const todayClass = date === openedDate ? "today" : "";
        if (!record) {
          return `
            <article class="record-card empty ${todayClass}" id="card-${date}">
              <div class="record-head">
                <h3>${formatDate(date)}</h3>
              </div>
              <p>未記録</p>
            </article>
          `;
        }

        const isSleepless = record.sleepStatus === "眠れない";
        const flowRows = isSleepless ? [
          row("ベッド", record.bedTime),
          "<div><dt>睡眠</dt><dd>眠れない</dd></div>"
        ] : [
          row("ベッド", record.bedTime),
          row("入眠", record.fellAsleepTime),
          row("起床", record.wakeTime),
          sleepMinutes(record) !== null ? row("睡眠時間", sleepLabel(record)) : ""
        ];
        const stateRows = isSleepless ? [] : [
          row("途中覚醒", record.nightWaking),
          row("悪夢", record.nightmare),
          row("起き上がり", record.riseStatus)
        ];
        const supportRows = [
          row("眠剤", record.medicine ? `${record.medicine}錠` : ""),
          record.memo ? `<div><dt>メモ</dt><dd>${escapeHtml(record.memo)}</dd></div>` : ""
        ];

        return `
          <article class="record-card ${isSleepless ? "sleepless" : ""} ${todayClass}" id="card-${record.date}">
            <div class="record-head">
              <h3>${formatDate(record.date)}</h3>
            </div>
            <div class="card-groups">
              ${groupRows(flowRows)}
              ${groupRows(stateRows)}
              ${groupRows(supportRows)}
            </div>
            <div class="card-actions">
              <button class="card-action" data-action="edit" data-date="${record.date}">編集</button>
              <button class="card-action danger" data-action="delete" data-date="${record.date}">削除</button>
            </div>
          </article>
        `;
      }

      function renderCards() {
        return filteredCards().map(({ date, record }) => renderCard(date, record)).join("");
      }

      function filterLabel(mode) {
        return {
          all: "すべて",
          sleepless: "眠れないだけ",
          nightmare: "悪夢ありだけ",
          waking: "途中覚醒ありだけ"
        }[mode] || "すべて";
      }

      function renderFilters() {
        const options = [
          ["all", "すべて"],
          ["sleepless", "眠れないだけ"],
          ["nightmare", "悪夢ありだけ"],
          ["waking", "途中覚醒ありだけ"]
        ];

        return `
          <div class="filter-panel">
            <button class="filter-toggle" data-action="toggleFilter">${filterLabel(filterMode)} ▼</button>
            ${filterOpen ? `
              <div class="filter-menu">
                ${options.map(([mode, label]) => `
                  <button class="filter ${filterMode === mode ? "active" : ""}" data-filter="${mode}">${label}</button>
                `).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }

      function renderBackup() {
        return `
          <section class="panel backup-panel">
            <button class="secondary" data-action="export">JSONバックアップを書き出す</button>
            <label class="secondary file-button">
              JSONバックアップを読み込む
              <input type="file" accept="application/json" data-action="import">
            </label>
          </section>
        `;
      }

      function render() {
        const record = currentRecord();
        app.innerHTML = `
          <main class="app-shell">
            <header class="header">
              <h1>ねむりメモ</h1>
            </header>
            ${renderForm(record)}
            ${renderBackup()}
            <section class="panel month-panel">
              <div class="month-head">
                <button class="secondary" data-action="prevMonth">前の月</button>
                <h2>${monthCursor.getFullYear()}年${monthCursor.getMonth() + 1}月</h2>
                <button class="secondary" data-action="nextMonth">次の月</button>
              </div>
              <button class="today-button" data-action="today">今日へ移動</button>
              ${renderSummary()}
              ${renderFilters()}
              <div class="cards">${renderCards()}</div>
            </section>
          </main>
        `;
      }

      function updateField(fieldName, value) {
        const record = currentRecord();
        const next = { ...record, [fieldName]: value };

        if (fieldName === "date") {
          selectedDate = value || today();
          next.date = selectedDate;
        }

        if (fieldName === "sleepStatus" && value === "眠れない") {
          upsertRecord(clearSleepDetails({ ...next, sleepStatus: "眠れない" }));
        } else {
          upsertRecord(next);
        }

        message = "";
        render();
      }

      function scrollToDate(date) {
        requestAnimationFrame(() => {
          const card = document.getElementById(`card-${date}`);
          if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      function scrollToForm() {
        requestAnimationFrame(() => {
          const form = document.getElementById("form-panel");
          if (form) form.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      app.addEventListener("input", (event) => {
        const fieldName = event.target.dataset.field;
        if (!fieldName) return;
        updateField(fieldName, event.target.value);
      });

      app.addEventListener("change", (event) => {
        if (event.target.dataset.field) {
          updateField(event.target.dataset.field, event.target.value);
          return;
        }

        if (event.target.dataset.action !== "import") return;
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result));
            const source = Array.isArray(parsed) ? parsed : Array.isArray(parsed.records) ? parsed.records : [];
            records = source.map(normalizeRecord);
            saveRecords();
            message = "記録できました";
            render();
          } catch {
            alert("JSONを読み込めませんでした");
          }
        };
        reader.readAsText(file);
      });

      app.addEventListener("click", (event) => {
        const target = event.target;
        const fieldName = target.dataset.field;
        const value = target.dataset.value;
        const action = target.dataset.action;
        const filter = target.dataset.filter;
        const date = target.dataset.date;

        if (fieldName && value !== undefined) updateField(fieldName, value);

        if (filter) {
          filterMode = filter;
          filterOpen = false;
          render();
        }

        if (action === "toggleFilter") {
          filterOpen = !filterOpen;
          render();
        }

        if (action === "finish") {
          message = "記録できました";
          render();
        }

        if (action === "prevMonth") {
          monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() - 1, 1);
          render();
        }

        if (action === "nextMonth") {
          monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 1);
          render();
        }

        if (action === "today") {
          const todayDate = new Date(`${openedDate}T00:00:00`);
          monthCursor = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
          filterMode = "all";
          render();
          scrollToDate(openedDate);
        }

        if (action === "edit" && date) {
          selectedDate = date;
          const editDate = new Date(`${date}T00:00:00`);
          monthCursor = new Date(editDate.getFullYear(), editDate.getMonth(), 1);
          message = "";
          render();
          scrollToForm();
        }

        if (action === "delete" && date) {
          const ok = confirm(`${formatDate(date)}の記録を削除しますか？`);
          if (!ok) return;
          deleteRecord(date);
          if (selectedDate === date) selectedDate = openedDate;
          message = "";
          render();
        }

        if (action === "export") {
          const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `nemuri-memo-${today()}.json`;
          link.click();
          URL.revokeObjectURL(url);
        }
      });

      render();
    </script>
  </body>
</html>
